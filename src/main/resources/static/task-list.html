<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tareas - EverTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet" />
</head>
<body class="d-flex flex-column h-100">

<nav class="navbar navbar-expand navbar-dark" aria-label="Navegación principal">
    <div class="container-fluid">
        <h1 class="d-flex align-items-center fs-4 text-white mb-0">
            <img src="/img/logo.png" width="36" height="36" class="me-3 th-logo" alt="EverTask logo">
            EverTask
        </h1>
        <div class="collapse navbar-collapse navbar-options">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/task-list.html">Inicio</a>
                </li>
                <li class="nav-item" id="navAdmin" style="display:none">
                    <a class="nav-link" href="/admin.html">Admin</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="userFullname"
                       data-bs-toggle="dropdown" aria-expanded="false">Usuario</a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" onclick="logout()">Cerrar sesión</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="flex-shrink-0 py-4">
    <div class="container">

        <!-- Formulario crear tarea -->
        <div class="card rounded-3 mb-4">
            <div class="card-body p-4">
                <h3 class="mb-3">Nueva tarea</h3>
                <div id="formError" class="alert alert-danger d-none"></div>
                <form id="createTaskForm">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label" for="taskTitle">Título</label>
                            <input type="text" id="taskTitle" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="taskDesc">Descripción</label>
                            <textarea class="form-control" id="taskDesc" rows="2" placeholder="Opcional..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="taskCategory">Categoría</label>
                            <select id="taskCategory" class="form-select">
                                <option value="-1">---</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="taskTags">Etiquetas</label>
                            <input type="text" id="taskTags" class="form-control" placeholder="tag1, tag2, tag3...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="taskDeadline">Fecha límite</label>
                            <input type="datetime-local" id="taskDeadline" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="taskPriority">Prioridad</label>
                            <select id="taskPriority" class="form-select">
                                <option value="LOW">Baja</option>
                                <option value="MEDIUM" selected>Media</option>
                                <option value="HIGH">Alta</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="taskNotes">Notas</label>
                            <textarea class="form-control" id="taskNotes" rows="2" placeholder="Opcional..."></textarea>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="taskStarred">
                                <label class="form-check-label" for="taskStarred">⭐ Destacada</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tabla de tareas -->
        <div class="card rounded-3">
            <div class="card-body p-4">
                <div id="emptyMsg" class="text-center d-none">
                    <h4 class="text-muted">No tienes tareas aún. ¡Crea la primera!</h4>
                </div>
                <table class="table mb-0" id="taskTable">
                    <thead>
                        <tr>
                            <th>★</th>
                            <th>Título</th>
                            <th>Categoría</th>
                            <th>Prioridad</th>
                            <th>Estado</th>
                            <th>Fecha límite</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<footer class="footer mt-auto py-3 bg-light fixed-bottom">
    <div class="container">
        <span class="text-muted">EverTask - Alesia Rubtsova</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Utilidades ──────────────────────────────────────────────────────────

    function priorityBadge(p) {
        const map = {
            HIGH:   ['badge-high',   'Alta'],
            MEDIUM: ['badge-medium', 'Media'],
            LOW:    ['badge-low',    'Baja']
        };
        const [cls, label] = map[p] || ['badge-pending', p];
        return `<span class="badge-priority ${cls}">${label}</span>`;
    }

    function statusBadge(s) {
        const map = {
            PENDING:              ['badge-pending',   'Pendiente'],
            IN_PROGRESS:          ['badge-progress',  'En progreso'],
            PARTIALLY_COMPLETED:  ['badge-partial',   'Parcial'],
            COMPLETED:            ['badge-completed', 'Completada']
        };
        const [cls, label] = map[s] || ['badge-pending', s];
        return `<span class="badge-status ${cls}">${label}</span>`;
    }

    function formatDate(dt) {
        if (!dt) return '—';
        const d = new Date(dt);
        const now = new Date();
        const overdue = d < now;
        const str = d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
        return overdue
            ? `<span class="text-danger fw-bold">${str}</span>`
            : `<span>${str}</span>`;
    }

    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/login.html';
    }

    // ── Cargar navbar ───────────────────────────────────────────────────────

    async function loadNavbar() {
        try {
            const res = await fetch('/api/auth/me');
            if (!res.ok) { window.location.href = '/login.html'; return; }
            const user = await res.json();
            document.getElementById('userFullname').textContent = user.fullname;
            if (user.role === 'ADMIN') {
                document.getElementById('navAdmin').style.display = 'block';
            }
        } catch {
            window.location.href = '/login.html';
        }
    }

    // ── Cargar categorías ───────────────────────────────────────────────────

    async function loadCategories() {
        try {
            const res = await fetch('/api/admin/categories');
            if (!res.ok) return;
            const categories = await res.json();
            const select = document.getElementById('taskCategory');
            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.title;
                select.appendChild(opt);
            });
        } catch (e) {
            console.error('Error cargando categorías:', e);
        }
    }

    // ── Cargar tareas ───────────────────────────────────────────────────────

    async function loadTasks() {
        try {
            const res = await fetch('/api/tasks');
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = '';

            if (!res.ok) {
                document.getElementById('taskTable').classList.add('d-none');
                document.getElementById('emptyMsg').classList.remove('d-none');
                return;
            }

            const tasks = await res.json();

            if (tasks.length === 0) {
                document.getElementById('taskTable').classList.add('d-none');
                document.getElementById('emptyMsg').classList.remove('d-none');
                return;
            }

            document.getElementById('taskTable').classList.remove('d-none');
            document.getElementById('emptyMsg').classList.add('d-none');

            tasks.forEach(task => {
                const tr = document.createElement('tr');
                if (task.completed) tr.classList.add('table-success');
                tr.innerHTML = `
                    <td><span class="${task.starred ? 'star-on' : 'star-off'}">★</span></td>
                    <td>
                        <span class="${task.completed ? 'text-decoration-line-through text-muted' : ''}">${task.title}</span>
                        ${task.notes ? `<br><small class="text-muted">${task.notes.substring(0, 40)}</small>` : ''}
                    </td>
                    <td>${task.category?.title ?? '—'}</td>
                    <td>${priorityBadge(task.priority)}</td>
                    <td>${statusBadge(task.status)}</td>
                    <td>${formatDate(task.deadline)}</td>
                    <td>
                        <a href="/task-edit.html?id=${task.id}" class="btn btn-primary btn-sm">Ver</a>
                        <button class="btn btn-sm ${task.completed ? 'btn-light' : 'btn-dark'} ms-1"
                            onclick="toggleTask(${task.id})">
                            ${task.completed ? 'Desmarcar' : 'Completar'}
                        </button>
                        <button class="btn btn-danger btn-sm ms-1" onclick="deleteTask(${task.id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error('Error cargando tareas:', e);
        }
    }

    // ── Crear tarea ─────────────────────────────────────────────────────────

    document.getElementById('createTaskForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const data = {
            title:      document.getElementById('taskTitle').value,
            description: document.getElementById('taskDesc').value,
            categoryId: parseInt(document.getElementById('taskCategory').value),
            tags:       document.getElementById('taskTags').value || '',
            deadline:   document.getElementById('taskDeadline').value || null,
            priority:   document.getElementById('taskPriority').value,
            notes:      document.getElementById('taskNotes').value,
            starred:    document.getElementById('taskStarred').checked
        };

        try {
            const res = await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                document.getElementById('createTaskForm').reset();
                loadTasks();
            } else {
                const err = document.getElementById('formError');
                err.textContent = 'Error al crear la tarea. Comprueba los campos.';
                err.classList.remove('d-none');
            }
        } catch (e) {
            console.error('Error creando tarea:', e);
        }
    });

    // ── Acciones ────────────────────────────────────────────────────────────

    async function toggleTask(id) {
        await fetch(`/api/tasks/${id}/toggle`, { method: 'PATCH' });
        loadTasks();
    }

    async function deleteTask(id) {
        if (!confirm('¿Seguro que quieres eliminar esta tarea?')) return;
        await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
    }

    // ── Inicio ──────────────────────────────────────────────────────────────

    loadNavbar();
    loadCategories();
    loadTasks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - EverTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet" />
</head>
<body class="d-flex flex-column h-100">

<nav class="navbar navbar-expand navbar-dark" aria-label="Navegación principal">
    <div class="container-fluid">
        <h1 class="d-flex align-items-center fs-4 text-white mb-0">
            <img src="/img/logo.png" width="36" height="36" class="me-3 th-logo" alt="EverTask logo">
            EverTask
        </h1>
    </div>
</nav>

<main class="flex-shrink-0 mt-4">
    <div class="container">
        <div class="row d-flex justify-content-center">
            <div class="col-md-6">
                <div class="card rounded-3">
                    <div class="card-body p-4">
                        <h3 class="mb-4">Registro</h3>

                        <div id="errorAlert" class="alert alert-danger d-none"></div>
                        <div id="successAlert" class="alert alert-success d-none"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="inputFullname" class="form-label">Nombre completo</label>
                                <input type="text" class="form-control" id="inputFullname" required>
                            </div>
                            <div class="mb-3">
                                <label for="inputUsername" class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="inputUsername" required>
                            </div>
                            <div class="mb-3">
                                <label for="inputEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="inputEmail" required>
                            </div>
                            <div class="mb-3">
                                <label for="inputPassword1" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="inputPassword1" required>
                            </div>
                            <div class="mb-3">
                                <label for="inputPassword2" class="form-label">Repetir contraseña</label>
                                <input type="password" class="form-control" id="inputPassword2" required>
                            </div>
                            <div class="mb-3">
                                <label for="inputBio" class="form-label">Bio <span class="text-muted">(opcional)</span></label>
                                <textarea class="form-control" id="inputBio" rows="3" placeholder="Cuéntanos algo sobre ti..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                            <a href="/login.html" class="btn btn-outline-secondary w-100 mt-2">Volver al login</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer mt-auto py-3 bg-light fixed-bottom">
    <div class="container">
        <span class="text-muted">EverTask - Alesia Rubtsova</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const password = document.getElementById('inputPassword1').value;
        const verifyPassword = document.getElementById('inputPassword2').value;

        if (password !== verifyPassword) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = 'Las contraseñas no coinciden';
            errorAlert.classList.remove('d-none');
            return;
        }

        const data = {
            fullname: document.getElementById('inputFullname').value,
            username: document.getElementById('inputUsername').value,
            email: document.getElementById('inputEmail').value,
            password: password,
            verifyPassword: verifyPassword,
            bio: document.getElementById('inputBio').value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                document.getElementById('successAlert').textContent = 'Registro exitoso. Redirigiendo al login...';
                document.getElementById('successAlert').classList.remove('d-none');
                setTimeout(() => window.location.href = '/login.html', 1500);
            } else {
                const errorAlert = document.getElementById('errorAlert');
                errorAlert.textContent = 'Error al registrar. Comprueba los datos.';
                errorAlert.classList.remove('d-none');
            }
        } catch (error) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = 'Error de conexión con el servidor.';
            errorAlert.classList.remove('d-none');
        }
    });
</script>
</body>
</html>

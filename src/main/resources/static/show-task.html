<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet" />
</head>
<body class="d-flex flex-column h-100">

<div class="table-responsive mt-4">
    <table class="table table-hover align-middle">
        <thead class="table-dark" style="background-color: #2D6A4F;"> <!-- Color verde de tu diseño -->
            <tr>
                <th>⭐</th>
                <th>Título</th>
                <th>Categoría</th>
                <th>Prioridad</th>
                <th>Estado</th>
                <th>Fecha límite</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- El th:each funciona como un bucle FOR. Recorre la lista 'tasks' -->
            <tr th:each="t : ${tasks}">
                <td th:text="${t.starred} ? '⭐' : ''"></td>
                <td th:text="${t.title}">Título de ejemplo</td>
                <td th:text="${t.category != null ? t.category.title : '---'}">Categoría</td>
                <td th:text="${t.priority}">Media</td>
                <td th:text="${t.status}">PENDING</td>
                <td th:text="${#temporals.format(t.deadline, 'dd/MM/yyyy HH:mm')}">12/12/2026</td>
                <td>
                    <!-- Botones de acción -->
                    <a th:href="@{/task/edit/{id}(id=${t.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/task/delete/{id}(id=${t.id})}" class="btn btn-sm btn-danger">Borrar</a>
                </td>
            </tr>
            <!-- Mensaje por si la lista está vacía -->
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="7" class="text-center">No hay tareas creadas todavía.</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>

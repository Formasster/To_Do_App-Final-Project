<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New user</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet" />
</head>
<body class="d-flex flex-column h-100">

<nav class="navbar navbar-expand navbar-dark" aria-label="Second navbar example">
    <div class="container-fluid">
        <h1 class="d-flex align-items-center fs-4 text-white mb-0">
            <img src="../static/img/logo.png" th:src="@{/img/logo.png}"
                 width="36" height="36" class="me-3 th-logo" alt="TaskHive logo">
            TaskHive
        </h1>
    </div>
</nav>

<main class="flex-shrink-0 mt-4">
    <div class="container">
        <div class="row d-flex justify-content-center">
            <div class="col-md-6">
                <div class="card rounded-3">
                    <div class="card-body p-4">
                        <h3 class="mb-4">Register new user</h3>
                        <form action="#" th:action="@{/auth/register/submit}" method="post" th:object="${user}">
                            <div class="mb-3">
                                <label for="inputFullname" class="form-label">Fullname</label>
                                <input type="text" class="form-control" id="inputFullname" th:field="*{fullname}">
                            </div>
                            <div class="mb-3">
                                <label for="inputUsername" class="form-label">Username</label>
                                <input type="text" class="form-control" id="inputUsername" th:field="*{username}">
                            </div>
                            <div class="mb-3">
                                <label for="inputEmail" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="inputEmail" th:field="*{email}">
                            </div>
                            <div class="mb-3">
                                <label for="inputPassword1" class="form-label">Password</label>
                                <input type="password" class="form-control" id="inputPassword1" th:field="*{password}">
                            </div>
                            <div class="mb-3">
                                <label for="inputPassword2" class="form-label">Repeat Password</label>
                                <input type="password" class="form-control" id="inputPassword2" th:field="*{verifyPassword}">
                            </div>
                            <div class="mb-3">
                                <label for="inputBio" class="form-label">Bio <span class="text-muted">(optional)</span></label>
                                <textarea class="form-control" id="inputBio" rows="3" th:field="*{bio}" placeholder="Tell us a bit about yourself..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer mt-auto py-3 bg-light fixed-bottom">
    <div class="container">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckCheckedDisabled" checked disabled>
        <span class="text-muted">TaskHive - Openwebinars.net - Luis Miguel López Magaña</span>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
